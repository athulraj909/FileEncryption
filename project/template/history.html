<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="stylesheet" href="{% static 'history\history.css' %}">

    <style>
      table{
          width: 70%;
          margin-top: 150px;
      }
  
      th{
          background-color: black;
          color: white;
          height: 40px;
          
          
      }
  
      tr:nth-child(even) {
          background-color: #E7E9EB;
      }
  
      td{
          text-align: center;
          height: 35px;
      }
  
  </style>

    <script>
        var properties = [
	'date',
	'name',
	'f_type',
	'sec_key',
	'encdec_type',
];

$.each( properties, function( i, val ) {
	
	var orderClass = '';

	$("#" + val).click(function(e){
		e.preventDefault();
		$('.filter__link.filter__link--active').not(this).removeClass('filter__link--active');
  		$(this).toggleClass('filter__link--active');
   		$('.filter__link').removeClass('asc desc');

   		if(orderClass == 'desc' || orderClass == '') {
    			$(this).addClass('asc');
    			orderClass = 'asc';
       	} else {
       		$(this).addClass('desc');
       		orderClass = 'desc';
       	}

		var parent = $(this).closest('.header__item');
    		var index = $(".header__item").index(parent);
		var $table = $('.table-content');
		var rows = $table.find('.table-row').get();
		var isSelected = $(this).hasClass('filter__link--active');
		var isNumber = $(this).hasClass('filter__link--number');
			
		rows.sort(function(a, b){

			var x = $(a).find('.table-data').eq(index).text();
    			var y = $(b).find('.table-data').eq(index).text();
				
			if(isNumber == true) {
    					
				if(isSelected) {
					return x - y;
				} else {
					return y - x;
				}

			} else {
			
				if(isSelected) {		
					if(x < y) return -1;
					if(x > y) return 1;
					return 0;
				} else {
					if(x > y) return -1;
					if(x < y) return 1;
					return 0;
				}
			}
    		});

		$.each(rows, function(index,row) {
			$table.append(row);
		});

		return false;
	});

});	
    </script>

</head>
<body>
    <div class="container">
        
        <div class="table">
            <table align="center">
              <tr>
                <th>Date</th>
                <th>File Name</th>
                <th>Security Key</th>
                <th>Encryption/Decryption Type</th>
              </tr>
              {% for encrypted_file in encrypted_files %}
              <tr>
                <td>{{encrypted_file.date}}</td>
                <td>{{encrypted_file.file}}</td>
                <td>{{encrypted_file.password}}</td>
                <td>{{encrypted_file.algorith}}</td>
              </tr>
              {% endfor %}
            </table>	
        </div>
    </div>
    <script src="{% static 'history\history.js' %}"></script>
</body>
</html>
