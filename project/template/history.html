<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="stylesheet" href="{% static 'history\history.css' %}">

    <style>
        body {
  background-color: black;
    font-family: sans-serif;
    margin: 0;
    padding: 0;
    color: white;
  }
  
  .container {
    border-radius: 5px;
    background-color: #333;
    color: white;
    width: 100vw;
    max-width: 700px;
    margin: 0 auto;
  }
  
  header {
    padding: 20px 50px 0px 50px;
    background-color: black;
    color: #ddd;
    text-align: right;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;

  }
  
  h1 {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
    text-align: left;
    display: inline-block;
  }

  p {
    font-size: 16px;
    line-height: 1.5;
    text-align: left;
  }
  
  main {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  section {
    padding: 25px;
    border-radius: 5px;
    box-shadow: 0px 0px 20px gray;
  }
  
  .file-upload {
    text-justify: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-color:rgb(34, 33, 33);
    color: white;
    border-radius: 5px;
  }
  
  .file-upload p {
    margin-bottom: 10px;
  }
  
  label {
    cursor: pointer;
  }
  
  input[type="file"] {
    display: none;
  }
  
  .password {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  button {
    background-color: #777;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    margin: 15px;
    cursor: pointer;
  }
  .history_btn{
    background-color: #333;
  }
  .history_btn:hover{
    background-color: #777;
  }
  
  a {
    color: #333;

    text-decoration: none;
  }


.tablink {
  box-shadow: 0px 0px 20px gray;
  align-items: center;
  background-color: #333;
  color: white;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 20px ;
  margin: 0px;
  font-size: 17px;
  width: 350px;
}

.tablink:hover {
  transition: 0.5s;
  background-color: #333;
}

/* Style the tab content (and add height:100% for full page content) */
.tabcontent {
  color: black;
  display: none;
  padding: 30px 20px;
  height: 100%;
}

#Encryption {background-color: black;}
#Decryption {background-color: black;}


.tab{
  background-color: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

.popup {
  position: fixed;
  z-index: 1;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0, 0, 0, 0.4);
  display: none;
}
.popup-content {
  background-color: white;
  margin: 10% auto;
  padding: 20px;
  border: 1px solid #888888;
  width: 30%;
  font-weight: bolder;
}
.popup-content button {
  display: block;
  margin: 0 auto;
}
.show {
  display: block;
}


/* Dropdown Button */
.dropbtn {
  background-color: #333;
  color: white;
  border: none;
  cursor: pointer;
}

/* Dropdown button on hover & focus */
.dropbtn:hover, .dropbtn:focus {
  background-color: #777;
}

/* The container <div> - needed to position the dropdown content */
.dropdown {
  position: relative;
  padding-left: 1050px;
  display: inline-block;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
  border-radius: 10px;
  display: none;
  position: absolute;
  background-color: #777;
  left: 60rem;
  min-width: 200px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 12;
}


/* Links inside the dropdown */
.dropdown-content a {
  color: black;
  padding: 12px 16px 10px 10px;
  width: fit-content;
  display:block;

}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #cccaca;}

/* Show the dropdown menu (use JS to add this class to the .dropdown-content container when the user clicks on the dropdown button) */
.show {display:block;}

.editbutton{
  background-color: black;  
  
}
.editbutton:hover{
  background-color: #333;
}


th,td{
  padding: 10px;
}

    </style>

    <script>
        var properties = [
	'date',
	'name',
	'f_type',
	'sec_key',
	'encdec_type',
];

$.each( properties, function( i, val ) {
	
	var orderClass = '';

	$("#" + val).click(function(e){
		e.preventDefault();
		$('.filter__link.filter__link--active').not(this).removeClass('filter__link--active');
  		$(this).toggleClass('filter__link--active');
   		$('.filter__link').removeClass('asc desc');

   		if(orderClass == 'desc' || orderClass == '') {
    			$(this).addClass('asc');
    			orderClass = 'asc';
       	} else {
       		$(this).addClass('desc');
       		orderClass = 'desc';
       	}

		var parent = $(this).closest('.header__item');
    		var index = $(".header__item").index(parent);
		var $table = $('.table-content');
		var rows = $table.find('.table-row').get();
		var isSelected = $(this).hasClass('filter__link--active');
		var isNumber = $(this).hasClass('filter__link--number');
			
		rows.sort(function(a, b){

			var x = $(a).find('.table-data').eq(index).text();
    			var y = $(b).find('.table-data').eq(index).text();
				
			if(isNumber == true) {
    					
				if(isSelected) {
					return x - y;
				} else {
					return y - x;
				}

			} else {
			
				if(isSelected) {		
					if(x < y) return -1;
					if(x > y) return 1;
					return 0;
				} else {
					if(x > y) return -1;
					if(x < y) return 1;
					return 0;
				}
			}
    		});

		$.each(rows, function(index,row) {
			$table.append(row);
		});

		return false;
	});

});	
    </script>

</head>
<body>
    <div class="container">
        
        <div class="table">
            <table>
              <tr>
                <th align="left">Date</th>
                <th align="left">File Name</th>
                <th align="left">Security Key</th>
                <th align="left">Encryption/Decryption Type</th>
                <th></th>
              </tr>
              {% for encrypted_file in encrypted_files %}
              <tr>
                <td></td>
                <td>{{encrypted_file.file}}</td>
                <td>{{encrypted_file.password}}</td>
                <td>{{encrypted_file.algorith}}</td>
                <td></td>
              </tr>
              {% endfor %}
            </table>	
        </div>
    </div>
    <script src="{% static 'history\history.js' %}"></script>
</body>
</html>
