<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <title>Encrypted Files</title>

    <style>

      table{
        width: 50%;
        margin-top: 100px;
      }
      
      caption{
        
        font-size: 25px;
        font-weight: bold;
        background-color: black;
        color: white;
      }

      tr:nth-child(odd) {
          background-color: #E7E9EB;
      }

      a{
        text-decoration: none;
        color: black;
        font-size: 18px;
      }

      td{
        height: 35px;
        padding-left: 20px;
      }

      button{
        background-color: black;
        color: white;
        height: 26px;
        font-size: 15px;
        border-radius: 10px;
        cursor:pointer;
      }

     

    </style>

</head>

<body>
    <div align="center" style="margin-top: 50px;">
    
    <table>
      <caption>Encrypted Files</caption>
        {% for encrypted_file in encrypted_files %}
        <tr>
          <td>{{ encrypted_file.file }}</td>
          <td><a href="{{ encrypted_file.file.url }}" download><button>download</button></a></td>
        </tr>
        {% endfor %}
    </table>
    </div>
</body>
</html>
